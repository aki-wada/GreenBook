<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenBook RAG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #1a1d27;
    border-bottom: 1px solid #2a2d3a;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #4fc3f7;
  }

  header h1 span { color: #78909c; font-weight: 400; font-size: 14px; }

  #status {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    background: #2a2d3a;
  }

  #status.ok { color: #66bb6a; }
  #status.error { color: #ef5350; }
  #status.loading { color: #ffa726; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }

  .msg-q {
    background: #1e3a5f;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 15px;
    line-height: 1.5;
  }

  .msg-a {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    line-height: 1.7;
  }

  /* Markdown content styles */
  .md-content h1, .md-content h2, .md-content h3, .md-content h4 {
    color: #4fc3f7;
    margin: 16px 0 8px 0;
    line-height: 1.3;
  }
  .md-content h1:first-child, .md-content h2:first-child, .md-content h3:first-child {
    margin-top: 0;
  }
  .md-content h1 { font-size: 18px; }
  .md-content h2 { font-size: 16px; }
  .md-content h3 { font-size: 15px; }
  .md-content h4 { font-size: 14px; color: #81d4fa; }

  .md-content p { margin-bottom: 8px; }
  .md-content p:last-child { margin-bottom: 0; }

  .md-content ul, .md-content ol {
    margin: 8px 0;
    padding-left: 24px;
  }
  .md-content li { margin-bottom: 4px; }
  .md-content li::marker { color: #4fc3f7; }

  .md-content strong { color: #e0e0e0; font-weight: 600; }
  .md-content em { color: #b0bec5; }

  .md-content blockquote {
    border-left: 3px solid #4fc3f7;
    margin: 8px 0;
    padding: 4px 12px;
    color: #90a4ae;
    background: rgba(79, 195, 247, 0.05);
    border-radius: 0 4px 4px 0;
  }

  .md-content code {
    background: #263238;
    color: #80cbc4;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  .md-content pre {
    background: #1e2530;
    border: 1px solid #2a2d3a;
    border-radius: 6px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
  }
  .md-content pre code {
    background: none;
    padding: 0;
    font-size: 13px;
  }

  .md-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
    line-height: 1.5;
  }
  .md-content thead th {
    background: #1e2530;
    color: #4fc3f7;
    font-weight: 600;
    text-align: left;
    padding: 8px 10px;
    border: 1px solid #2a2d3a;
    white-space: nowrap;
  }
  .md-content tbody td {
    padding: 6px 10px;
    border: 1px solid #2a2d3a;
    vertical-align: top;
  }
  .md-content tbody tr:nth-child(even) {
    background: rgba(255, 255, 255, 0.02);
  }
  .md-content tbody tr:hover {
    background: rgba(79, 195, 247, 0.05);
  }

  .md-content hr {
    border: none;
    border-top: 1px solid #2a2d3a;
    margin: 12px 0;
  }

  .md-content a {
    color: #4fc3f7;
    text-decoration: none;
  }
  .md-content a:hover { text-decoration: underline; }

  .sources {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #2a2d3a;
    font-size: 13px;
    color: #90a4ae;
  }

  .sources summary {
    cursor: pointer;
    color: #4fc3f7;
    font-size: 13px;
    margin-bottom: 6px;
  }

  .source-item {
    padding: 6px 0;
    border-bottom: 1px solid #1e2030;
    display: flex;
    gap: 8px;
    align-items: baseline;
  }

  .source-item:last-child { border-bottom: none; }

  .source-page {
    background: #263238;
    color: #4fc3f7;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }

  .source-score {
    color: #66bb6a;
    font-size: 12px;
    white-space: nowrap;
  }

  .source-preview {
    color: #78909c;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .meta {
    margin-top: 8px;
    font-size: 12px;
    color: #546e7a;
  }

  .typing {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: #4fc3f7;
    animation: blink 0.8s infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  #input-area {
    background: #1a1d27;
    border-top: 1px solid #2a2d3a;
    padding: 16px 20px;
    flex-shrink: 0;
  }

  #input-form {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
  }

  #question {
    flex: 1;
    background: #0f1117;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 15px;
    color: #e0e0e0;
    outline: none;
    transition: border-color 0.2s;
  }

  #question:focus { border-color: #4fc3f7; }
  #question::placeholder { color: #546e7a; }

  #send {
    background: #4fc3f7;
    color: #0f1117;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  #send:hover { background: #81d4fa; }
  #send:disabled { background: #37474f; color: #546e7a; cursor: not-allowed; }

  .welcome {
    text-align: center;
    margin: auto;
    max-width: 500px;
    color: #546e7a;
  }

  .welcome h2 { color: #4fc3f7; font-size: 20px; margin-bottom: 12px; }
  .welcome p { font-size: 14px; line-height: 1.6; margin-bottom: 8px; }

  .examples {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
  }

  .example-btn {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    padding: 10px 14px;
    color: #b0bec5;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s;
  }

  .example-btn:hover { border-color: #4fc3f7; color: #e0e0e0; }

  @media (max-width: 600px) {
    header { padding: 10px 12px; }
    #chat { padding: 12px; }
    #input-area { padding: 12px; }
    #input-form { gap: 8px; }
    #question { padding: 10px 12px; font-size: 14px; }
    #send { padding: 10px 16px; font-size: 14px; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
</head>
<body>

<header>
  <h1>GreenBook RAG <span>Radiology Review Manual 7th Ed.</span></h1>
  <div id="status" class="loading">connecting...</div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <h2>GreenBook RAG</h2>
    <p>Radiology Review Manual の内容に基づいて回答します。<br>英語・日本語どちらでも質問できます。</p>
    <div class="examples">
      <button class="example-btn" onclick="askExample(this)">What are the MRI findings of hepatic hemangioma?</button>
      <button class="example-btn" onclick="askExample(this)">What is the differential diagnosis of ring-enhancing brain lesions?</button>
      <button class="example-btn" onclick="askExample(this)">肝血管腫のMRI所見は？</button>
    </div>
  </div>
</div>

<div id="input-area">
  <form id="input-form" onsubmit="handleSubmit(event)">
    <input type="text" id="question" placeholder="質問を入力... (例: What are MRI findings of...)" autocomplete="off">
    <button type="submit" id="send">送信</button>
  </form>
</div>

<script>
const chat = document.getElementById('chat');
const questionInput = document.getElementById('question');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
const welcome = document.getElementById('welcome');

// Health check
fetch('/api/health')
  .then(r => r.json())
  .then(d => {
    if (d.status === 'ok') {
      statusEl.textContent = `${d.vectordb_chunks} chunks`;
      statusEl.className = 'ok';
    } else {
      statusEl.textContent = 'LM Studio offline';
      statusEl.className = 'error';
    }
  })
  .catch(() => {
    statusEl.textContent = 'error';
    statusEl.className = 'error';
  });

function askExample(btn) {
  questionInput.value = btn.textContent;
  handleSubmit(new Event('submit'));
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// marked.js configuration
marked.setOptions({
  breaks: true,     // \n → <br> (GFM style)
  gfm: true,        // GitHub Flavored Markdown (tables, strikethrough)
});

function renderMarkdown(text) {
  return '<div class="md-content">' + marked.parse(text) + '</div>';
}

async function handleSubmit(e) {
  e.preventDefault();
  const q = questionInput.value.trim();
  if (!q) return;

  // Hide welcome
  if (welcome) welcome.style.display = 'none';

  // Disable input
  sendBtn.disabled = true;
  questionInput.disabled = true;
  questionInput.value = '';

  // Add question bubble
  const qDiv = document.createElement('div');
  qDiv.className = 'msg msg-q';
  qDiv.textContent = q;
  chat.appendChild(qDiv);

  // Add answer bubble
  const aDiv = document.createElement('div');
  aDiv.className = 'msg msg-a';
  aDiv.innerHTML = '<span class="typing"></span>';
  chat.appendChild(aDiv);
  chat.scrollTop = chat.scrollHeight;

  let answerText = '';
  let sourcesHtml = '';
  let metaHtml = '';

  try {
    const resp = await fetch('/api/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7);
        } else if (line.startsWith('data: ')) {
          const data = JSON.parse(line.slice(6));

          if (eventType === 'sources') {
            sourcesHtml = '<details class="sources"><summary>Sources (' + data.chunks_used + ' chunks)</summary>';
            for (const s of data.sources) {
              sourcesHtml += '<div class="source-item">'
                + '<span class="source-page">p.' + s.page + '</span>'
                + '<span class="source-score">' + (s.score * 100).toFixed(0) + '%</span>'
                + '<span class="source-preview">' + escapeHtml(s.preview) + '</span>'
                + '</div>';
            }
            sourcesHtml += '</details>';
          } else if (eventType === 'token') {
            answerText += data.text;
            aDiv.innerHTML = renderMarkdown(answerText) + '<span class="typing"></span>';
            chat.scrollTop = chat.scrollHeight;
          } else if (eventType === 'done') {
            metaHtml = '<div class="meta">' + data.model + ' | ' + data.language + ' | ' + data.elapsed + 's</div>';
          } else if (eventType === 'error') {
            answerText = 'Error: ' + data.error;
          }
        }
      }
    }
  } catch (err) {
    answerText = 'Connection error: ' + err.message;
  }

  // Final render
  aDiv.innerHTML = renderMarkdown(answerText) + sourcesHtml + metaHtml;
  chat.scrollTop = chat.scrollHeight;

  sendBtn.disabled = false;
  questionInput.disabled = false;
  questionInput.focus();
}

// Enter key to submit
questionInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    document.getElementById('input-form').dispatchEvent(new Event('submit'));
  }
});
</script>
</body>
</html>
